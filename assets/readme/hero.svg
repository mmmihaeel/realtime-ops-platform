    <rect x="95" y="0" width="105" height="32" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6" />
    <text x="147.5" y="21" fill="#E2E8F0" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">TypeScript</text>

    <rect x="210" y="0" width="115" height="32" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6" />
    <text x="267.5" y="21" fill="#E2E8F0" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">PostgreSQL</text>

    <rect x="335" y="0" width="105" height="32" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6" />
    <text x="387.5" y="21" fill="#E2E8F0" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">RabbitMQ</text>

    <rect x="450" y="0" width="75" height="32" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6" />
    <text x="487.5" y="21" fill="#E2E8F0" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Redis</text>

    <rect x="535" y="0" width="115" height="32" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6" />
    <text x="592.5" y="21" fill="#E2E8F0" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">WebSockets</text>
  </g>
  <g transform="translate(740, 50)">
    <rect x="0" y="0" width="480" height="280" fill="url(#card-grad)" stroke="#334155" stroke-width="1" rx="16" />
    <rect x="0" y="0" width="480" height="44" fill="#1E293B" rx="16" />
    <path d="M 0 44 L 480 44" stroke="#334155" stroke-width="1" />
    <circle cx="24" cy="22" r="5" fill="#EF4444" />
    <circle cx="40" cy="22" r="5" fill="#F59E0B" />
    <circle cx="56" cy="22" r="5" fill="#10B981" />
    <text x="240" y="26" fill="#94A3B8" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">SYSTEM SNAPSHOT</text>


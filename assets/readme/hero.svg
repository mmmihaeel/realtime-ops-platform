<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380">
  <defs>
    <pattern id="hero-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="380" fill="#0F172A" />
  <rect width="1280" height="380" fill="url(#hero-grid)" />
  <text x="80" y="90" fill="#38BDF8" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="2">NESTJS MICROSERVICES PLATFORM</text>
  <text x="80" y="145" fill="#F8FAFC" font-size="46" font-family="system-ui, -apple-system, sans-serif" font-weight="800" letter-spacing="-1">realtime-ops-platform</text>
  <text x="80" y="195" fill="#94A3B8" font-size="18" font-family="system-ui, -apple-system, sans-serif" font-weight="400">Jobs, alerts, incidents, notifications, retries, and realtime</text>
  <text x="80" y="225" fill="#94A3B8" font-size="18" font-family="system-ui, -apple-system, sans-serif" font-weight="400">operational updates over WebSockets.</text>
  <g transform="translate(80, 275)">
    <rect x="0" y="0" width="85" height="32" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6" />

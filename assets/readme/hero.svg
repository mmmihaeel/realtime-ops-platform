    <path d="M 120 115 L 120 140" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />
    <path d="M 120 180 L 120 205" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />
    <path d="M 190 160 L 290 160" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />
    <path d="M 360 140 L 360 115" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />
    <path d="M 360 180 L 360 205" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Nodes -->
    <g transform="translate(50, 75)">
      <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
      <rect width="4" height="40" fill="#38BDF8" rx="2" />
      <text x="70" y="25" fill="#F8FAFC" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">API Gateway</text>
    </g>

    <g transform="translate(50, 140)">
      <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
      <rect width="4" height="40" fill="#F97316" rx="2" />
      <text x="70" y="25" fill="#F8FAFC" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">RabbitMQ</text>
    </g>

    <g transform="translate(50, 205)">
      <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
      <rect width="4" height="40" fill="#F59E0B" rx="2" />
      <text x="70" y="25" fill="#F8FAFC" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">PostgreSQL</text>
    </g>

    <g transform="translate(290, 75)">
      <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
      <rect width="4" height="40" fill="#38BDF8" rx="2" />
      <text x="70" y="25" fill="#F8FAFC" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Realtime Gateway</text>
    </g>

    <g transform="translate(290, 140)">
      <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
      <rect width="4" height="40" fill="#10B981" rx="2" />
      <text x="70" y="25" fill="#F8FAFC" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Processing Service</text>
    </g>

    <g transform="translate(290, 205)">
      <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
      <rect width="4" height="40" fill="#A855F7" rx="2" />
      <text x="70" y="25" fill="#F8FAFC" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Redis</text>
    </g>

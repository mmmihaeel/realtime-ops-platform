<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <pattern id="top-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <marker id="arrow-top" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#64748B" />
    </marker>
  </defs>
  <rect width="1280" height="360" fill="#0F172A" />
  <rect width="1280" height="360" fill="url(#top-grid)" />
  <text x="80" y="50" fill="#94A3B8" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="1">PLATFORM TOPOLOGY</text>
  <!-- Connectors -->
  <path d="M 240 120 L 300 120" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-top)" />
  <text x="270" y="110" fill="#94A3B8" font-size="11" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Publish</text>
  <path d="M 470 120 L 530 120" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-top)" />
  <text x="500" y="110" fill="#94A3B8" font-size="11" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Consume</text>
  <path d="M 700 120 L 760 120" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-top)" />
  <text x="730" y="110" fill="#94A3B8" font-size="11" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Fanout</text>
  <path d="M 930 120 L 990 120" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-top)" />
  <text x="960" y="110" fill="#94A3B8" font-size="11" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">WSS</text>
  <!-- DB/Redis Connectors -->
  <path d="M 620 150 L 620 220 L 520 220 L 520 250" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-top)" stroke-linejoin="round" />
  <path d="M 620 150 L 620 220 L 720 220 L 720 250" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-top)" stroke-linejoin="round" />
  <text x="560" y="210" fill="#94A3B8" font-size="11" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Store Data</text>
  <text x="680" y="210" fill="#94A3B8" font-size="11" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">Locks / Limits</text>
  <!-- Nodes -->
  <g transform="translate(80, 90)">
    <rect width="160" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#38BDF8" rx="3" />
    <text x="80" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">API Gateway</text>
  </g>
  <g transform="translate(310, 90)">
    <rect width="160" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#F97316" rx="3" />
    <text x="80" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">RabbitMQ</text>
  </g>
  <g transform="translate(540, 90)">
    <rect width="160" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#10B981" rx="3" />
    <text x="80" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Processing Service</text>
  </g>
  <g transform="translate(770, 90)">
    <rect width="160" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#38BDF8" rx="3" />
    <text x="80" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Realtime Gateway</text>
  </g>
  <g transform="translate(1000, 90)">
    <rect width="160" height="60" fill="#0F172A" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" rx="8" />
    <text x="80" y="35" fill="#CBD5E1" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Clients / Users</text>
  </g>
  <g transform="translate(440, 250)">
    <rect width="160" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#F59E0B" rx="3" />
    <text x="80" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">PostgreSQL</text>
  </g>
  <g transform="translate(640, 250)">
    <rect width="160" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#A855F7" rx="3" />
    <text x="80" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Redis</text>
  </g>
</svg>

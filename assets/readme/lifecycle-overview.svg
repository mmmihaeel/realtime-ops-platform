<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <pattern id="lc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#64748B" />
    </marker>
    <marker id="arrow-success" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#10B981" />
    </marker>
    <marker id="arrow-danger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#EF4444" />
    </marker>
  </defs>
  <rect width="1280" height="320" fill="#0F172A" />
  <rect width="1280" height="320" fill="url(#lc-grid)" />
  <text x="80" y="50" fill="#94A3B8" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="1">LIFECYCLE OVERVIEW</text>
  <!-- Connectors -->
  <path d="M 220 160 L 290 160" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
  <path d="M 450 145 L 500 145 L 500 90 L 550 90" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" stroke-linejoin="round" />
  <path d="M 450 175 L 500 175 L 500 230 L 550 230" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" stroke-linejoin="round" />
  <!-- Back to Processing (Retry) -->
  <path d="M 570 205 L 570 190 L 410 190 L 410 205" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" stroke-linejoin="round" />
  <path d="M 690 230 L 760 230" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-danger)" />
  <path d="M 900 230 L 970 230" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" />
  <!-- Nodes -->
  <g transform="translate(80, 135)">
    <rect width="140" height="50" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="50" fill="#64748B" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Queued</text>
  </g>
  <g transform="translate(310, 135)">
    <rect width="140" height="50" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="50" fill="#38BDF8" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Processing</text>
  </g>
  <g transform="translate(560, 65)">
    <rect width="140" height="50" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="8" />
    <rect width="6" height="50" fill="#10B981" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Completed</text>
  </g>
  <g transform="translate(560, 205)">
    <rect width="140" height="50" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="50" fill="#F97316" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Failed</text>
  </g>
  <g transform="translate(310, 205)">
    <rect width="140" height="50" fill="#1E293B" stroke="#334155" stroke-width="1" stroke-dasharray="4,4" rx="8" />
    <rect width="6" height="50" fill="#F59E0B" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Retry</text>
  </g>
  <g transform="translate(770, 205)">
    <rect width="140" height="50" fill="#1E293B" stroke="#EF4444" stroke-width="1" rx="8" />
    <rect width="6" height="50" fill="#EF4444" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Alerted</text>
  </g>
  <g transform="translate(980, 205)">
    <rect width="140" height="50" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="8" />
    <rect width="6" height="50" fill="#10B981" rx="3" />
    <text x="70" y="30" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Resolved</text>
  </g>
</svg>
